<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../image/crazy image.png">
    <title>Employees - Attendance Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981; 
            --primary-hover: #059669;
            --bg-body: #0f172a; 
            --bg-card: #1e293b; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --border: #334155; 
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Inter', sans-serif; 
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 260px;
            background-color: var(--bg-card);
            border-right: 1px solid var(--border);
            padding: 32px 0;
            display: flex;
            flex-direction: column;
        }

        .brand {
            padding: 0 32px 32px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
        }

        .brand h2 {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .brand span {
            color: var(--primary);
        }

        .nav-items {
            list-style: none;
            padding: 0 16px;
            flex-grow: 1;
        }

        .nav-items li {
            margin-bottom: 8px;
        }

        .nav-items a {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .nav-items a:hover, .nav-items a.active {
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--primary);
        }

        .logout-btn {
            margin: 0 16px;
            padding: 12px 16px;
            background: transparent;
            color: #ef4444; 
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            padding: 48px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 4px;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 32px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            max-width: 400px;
            padding: 14px 20px 14px 44px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 14px;
            transition: all 0.2s ease;
            outline: none;
        }

        .search-container input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Employee Grid */
        .employee-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        /* The "Glass" Card */
        .employee-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .employee-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        .initials-circle {
            width: 48px;
            height: 48px;
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: 1px;
            margin-right: 16px;
            flex-shrink: 0;
            text-transform: uppercase;
        }

        .name-role h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .name-role p {
            font-size: 13px;
            color: var(--primary);
            font-weight: 500;
        }

        .card-body {
            border-top: 1px solid var(--border);
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .info-row {
            display: flex;
            flex-direction: column;
        }

        .info-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 13px;
            color: #cbd5e1;
        }

        /* Buttons */
        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .primary-btn:hover {
            background: var(--primary-hover);
        }

        /* Modal Styles */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(15, 23, 42, 0.8); 
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: var(--bg-card);
            margin: 8% auto; 
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            border-top: 4px solid var(--primary);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .modal-header h2 {
            font-size: 20px;
        }

        .close-btn {
            color: var(--text-muted);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            background: none;
            border: none;
        }

        .close-btn:hover {
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-main);
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--primary);
        }

        .form-row {
            display: flex;
            gap: 16px;
        }

        .form-row .form-group {
            flex: 1;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">
            <h2>Attendance<span>Audit</span></h2>
        </div>
        <ul class="nav-items">
            <li><a href="dashboard.html">Overview Dashboard</a></li>
            <li><a href="#" class="active">Employees</a></li>
            <li><a href="upload.html">Upload Timesheets</a></li>
            <li><a href="#">Audit Reports</a></li>
        </ul>
        <button class="logout-btn" onclick="logout()">Log Out</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="header">
            <div>
                <h1>Employee Directory</h1>
                <p>Manage and view all registered personnel.</p>
            </div>
            <button class="primary-btn" onclick="openModal()">+ Add Employee</button>
        </header>

        <div class="search-container">
            <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="searchInput" placeholder="Search employees by name or role...">
        </div>

        <div class="employee-grid" id="employeeGrid">
            <!-- Cards will be injected here by Javascript -->
        </div>
    </main>

    <!-- Add Employee Modal -->
    <div id="addEmployeeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add New Employee</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="addEmployeeForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <input type="text" id="role" placeholder="e.g. Software Engineer" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="john.doe@company.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <!-- Type is number since backend expects a Long -->
                    <input type="number" id="number" placeholder="9812345670" required>
                </div>
                <button type="submit" class="primary-btn" style="width: 100%; margin-top: 16px;">Save Employee</button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. Fetching and Rendering ---
        const employeeGrid = document.getElementById('employeeGrid');

        async function fetchEmployees() {
            try {
                const response = await fetch('http://localhost:8080/api/employee');
                const employees = await response.json();
                renderEmployees(employees);
            } catch (error) {
                console.error("Failed to fetch employees:", error);
                employeeGrid.innerHTML = '<p style="color:#ef4444">Error loading employees from server.</p>';
            }
        }

        function renderEmployees(employees) {
            employeeGrid.innerHTML = ''; // Clear existing cards
            
            if(employees.length === 0) {
                employeeGrid.innerHTML = '<p style="color:var(--text-muted)">No employees found. Add your first one!</p>';
                return;
            }

            employees.forEach(emp => {
                const initials = (emp.firstName.charAt(0) + emp.lastName.charAt(0)).toUpperCase();
                
                const card = document.createElement('div');
                card.className = 'employee-card';
                card.innerHTML = `
                    <div class="card-header">
                        <div class="initials-circle">${initials}</div>
                        <div class="name-role">
                            <h3 class="emp-name">${emp.firstName} ${emp.lastName}</h3>
                            <p class="emp-role">${emp.role}</p>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <span class="info-label">Email Address</span>
                            <span class="info-value">${emp.email}</span>
                        </div>
                        <div class="info-row" style="margin-top: 12px;">
                            <span class="info-label">Phone Number</span>
                            <span class="info-value">+91 ${emp.number}</span>
                        </div>
                    </div>
                `;
                employeeGrid.appendChild(card);
            });
        }

        // --- 2. Live Search Filtering ---
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('keyup', function(e) {
            const searchTerm = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.employee-card');

            cards.forEach(card => {
                const name = card.querySelector('.emp-name').textContent.toLowerCase();
                const role = card.querySelector('.emp-role').textContent.toLowerCase();
                
                if(name.includes(searchTerm) || role.includes(searchTerm)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        });

        // --- 3. Modal Logic ---
        const modal = document.getElementById('addEmployeeModal');

        function openModal() {
            modal.style.display = 'block';
        }

        function closeModal() {
            modal.style.display = 'none';
            document.getElementById('addEmployeeForm').reset();
        }

        // --- 4. Submitting a New Employee ---
        document.getElementById('addEmployeeForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            // Collect data from form
            const newEmployee = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                role: document.getElementById('role').value,
                email: document.getElementById('email').value,
                number: document.getElementById('number').value
            };

            try {
                // Send to backend
                const response = await fetch('http://localhost:8080/api/employee', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newEmployee)
                });

                if(response.ok) {
                    closeModal();
                    // Immediately re-fetch and render the updated list!
                    fetchEmployees();
                } else {
                    const errorJson = await response.json();
                    let alertMessage = "Failed to add employee. Please fix these errors:\n\n";
                    for (const [field, message] of Object.entries(errorJson)) {
                        const cleanField = field.charAt(0).toUpperCase() + field.slice(1);
                        alertMessage += `• ${cleanField}: ${message}\n`;
                    }
                    alert(alertMessage);
                }
            } catch (error) {
                console.error("Error saving employee:", error);
                alert("Error connecting to server.");
            }
        });

        function logout() {
            window.location.href = 'login.html';
        }

        // Run fetch on initial page load
        fetchEmployees();
    </script>
</body>
</html>
